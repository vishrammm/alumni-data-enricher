<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Data Enricher</title>
    <meta name="description" content="Enrich alumni data with LinkedIn profiles, current roles, and company information.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border: rgba(99, 102, 241, 0.2);
            --border-hover: rgba(99, 102, 241, 0.5);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.2);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            --gradient-2: linear-gradient(135deg, #0a0e1a 0%, #1e1b4b 50%, #0a0e1a 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Effects */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            top: -200px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
            bottom: -150px;
            left: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--gradient-1);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .logo svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.925rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.5;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.03), rgba(139,92,246,0.03));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent-light);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .upload-zone:hover::before, .upload-zone.drag-over::before {
            opacity: 1;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            color: var(--accent-light);
            opacity: 0.8;
        }

        .upload-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .upload-text strong {
            color: var(--accent-light);
            font-weight: 600;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        /* File Info */
        .file-info {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 20px;
        }

        .file-info.visible {
            display: flex;
        }

        .file-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .file-remove {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .file-remove:hover {
            background: var(--error-glow);
            color: var(--error);
            border-color: var(--error);
        }

        /* Button */
        .btn-process {
            display: none;
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: var(--gradient-1);
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn-process.visible {
            display: block;
        }

        .btn-process::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-process:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-process:hover:not(:disabled) {
            box-shadow: 0 8px 32px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-process:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-process:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Progress */
        .progress-section {
            display: none;
            margin-top: 24px;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .progress-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--gradient-1);
            border-radius: 3px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .progress-bar.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* Status */
        .status {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status.visible {
            display: flex;
        }

        .status.success {
            background: var(--success-glow);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .status.error {
            background: var(--error-glow);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .status svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Download Button */
        .btn-download {
            display: none;
            width: 100%;
            padding: 14px 24px;
            border: 2px solid var(--success);
            border-radius: 12px;
            background: var(--success-glow);
            color: var(--success);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            text-decoration: none;
            text-align: center;
        }

        .btn-download.visible {
            display: block;
        }

        .btn-download:hover {
            background: rgba(34, 197, 94, 0.15);
            box-shadow: 0 8px 32px var(--success-glow);
            transform: translateY(-1px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .card { padding: 24px; }
            .upload-zone { padding: 32px 16px; }
            h1 { font-size: 1.5rem; }
        }

        /* Spinner for processing */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-effects"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
                </svg>
            </div>
            <h1>Alumni Data Enricher</h1>
            <p class="subtitle">Upload your alumni spreadsheet and enrich it with LinkedIn profiles, current roles, and company data.</p>
        </div>

        <div class="card">
            <div class="upload-zone" id="uploadZone">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                </svg>
                <p class="upload-text"><strong>Click to upload</strong> or drag and drop</p>
                <p class="upload-hint">Supports .xlsx, .xls, .ods, .csv</p>
                <input type="file" class="file-input" id="fileInput" accept=".xlsx,.xls,.ods,.csv">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                    </svg>
                </div>
                <div class="file-details">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-size" id="fileSize"></div>
                </div>
                <button class="file-remove" id="fileRemove" title="Remove file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <button class="btn-process" id="btnProcess">
                Enrich Alumni Data
            </button>

            <div class="progress-section" id="progressSection">
                <div class="progress-header">
                    <span class="progress-label" id="progressLabel">Processing...</span>
                    <span class="progress-count" id="progressCount"></span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar indeterminate" id="progressBar"></div>
                </div>
            </div>

            <div class="status" id="statusBox">
                <svg id="statusIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="statusText"></span>
            </div>

            <a class="btn-download" id="btnDownload" href="#">
                ⬇ Download Enriched File
            </a>
        </div>

        <div class="footer">
            Powered by SerpAPI & Proxycurl &middot; Alumni Data Enricher
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileRemove = document.getElementById('fileRemove');
        const btnProcess = document.getElementById('btnProcess');
        const progressSection = document.getElementById('progressSection');
        const progressLabel = document.getElementById('progressLabel');
        const progressCount = document.getElementById('progressCount');
        const progressBar = document.getElementById('progressBar');
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const btnDownload = document.getElementById('btnDownload');

        let selectedFile = null;

        // Upload zone click
        uploadZone.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        // Remove file
        fileRemove.addEventListener('click', () => {
            resetState();
        });

        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            fileInfo.classList.add('visible');
            btnProcess.classList.add('visible');
            // Hide previous results
            statusBox.classList.remove('visible');
            btnDownload.classList.remove('visible');
            progressSection.classList.remove('visible');
        }

        function resetState() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('visible');
            btnProcess.classList.remove('visible');
            statusBox.classList.remove('visible');
            btnDownload.classList.remove('visible');
            progressSection.classList.remove('visible');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Process button
        btnProcess.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Disable button, show progress
            btnProcess.disabled = true;
            btnProcess.innerHTML = '<span class="spinner"></span> Processing...';
            progressSection.classList.add('visible');
            progressLabel.textContent = 'Enriching alumni data...';
            progressCount.textContent = 'This may take a while';
            statusBox.classList.remove('visible');
            btnDownload.classList.remove('visible');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                progressSection.classList.remove('visible');

                if (data.success) {
                    // Show success
                    progressBar.classList.remove('indeterminate');
                    progressBar.style.width = '100%';

                    statusBox.className = 'status visible success';
                    statusIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';
                    statusText.textContent = `Successfully enriched ${data.total_processed} records!`;

                    btnDownload.href = data.download_url;
                    btnDownload.classList.add('visible');
                } else {
                    // Show error
                    statusBox.className = 'status visible error';
                    statusIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>';
                    statusText.textContent = data.error || 'Unknown error occurred';
                }
            } catch (err) {
                progressSection.classList.remove('visible');
                statusBox.className = 'status visible error';
                statusIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>';
                statusText.textContent = 'Network error. Please try again.';
            } finally {
                btnProcess.disabled = false;
                btnProcess.innerHTML = 'Enrich Alumni Data';
            }
        });
    </script>
</body>
</html>
